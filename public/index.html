<!doctype html>
<html lang="en" data-theme="dark" data-accent="green" data-density="cozy">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b0d10" />
    <meta
      name="description"
      content="Ruban Sahoo — software engineer. Backend platforms, patch automation, time-series viz, and the occasional multi-tenant auth service."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <script>
      // avoid theme flash: read persisted choice before paint
      (function () {
        try {
          var html = document.documentElement;
          var saved = localStorage.getItem('__ruban_portfolio');
          if (saved) {
            var t = JSON.parse(saved);
            if (t.theme) html.setAttribute('data-theme', t.theme);
            if (t.accent) html.setAttribute('data-accent', t.accent);
            if (t.density) html.setAttribute('data-density', t.density);
          }
        } catch (e) {}
      })();
    </script>

    <title>Ruban Sahoo — Software Engineer</title>
  </head>
  <body>
    <noscript>
      <div style="padding:24px;font-family:'JetBrains Mono',monospace;color:#e7e8eb;background:#0b0d10;">

        <p>Software Engineer · Bangalore, IN · <a href="mailto:ruban1work@gmail.com" style="color:#7cc88f">ruban1work@gmail.com</a></p>
        <p>This portfolio needs JavaScript. The short version: backend platforms, patch automation at scale, and developer tools.</p>
      </div>
    </noscript>
    <div id="root"></div>
  </body>
</html>
